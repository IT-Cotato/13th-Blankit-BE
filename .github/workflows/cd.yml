name: Backend CD

on:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ockk/blankit-be:latest
            ockk/blankit-be:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ~/blankit

      - name: Deploy to Azure server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USER_PASSWORD: ${{ secrets.DB_USER_PASSWORD }}
          DB_URL: ${{ secrets.DB_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_TOKEN_EXPIRATION: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION }}
          JWT_REFRESH_TOKEN_EXPIRATION: ${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION }}
          APP_IMAGE_TAG: ockk/blankit-be:${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DB_NAME,DB_USERNAME,DB_PASSWORD,DB_USER_PASSWORD,DB_URL,JWT_SECRET,JWT_ACCESS_TOKEN_EXPIRATION,JWT_REFRESH_TOKEN_EXPIRATION,APP_IMAGE_TAG
          script: |
            cd ~/blankit
            printf 'DB_NAME=%s\nDB_USERNAME=%s\nDB_PASSWORD=%s\nDB_USER_PASSWORD=%s\nDB_URL=%s\nJWT_SECRET=%s\nJWT_ACCESS_TOKEN_EXPIRATION=%s\nJWT_REFRESH_TOKEN_EXPIRATION=%s\nAPP_IMAGE_TAG=%s\n' \
              "$DB_NAME" "$DB_USERNAME" "$DB_PASSWORD" "$DB_USER_PASSWORD" "$DB_URL" "$JWT_SECRET" "${JWT_ACCESS_TOKEN_EXPIRATION:-3600000}" "${JWT_REFRESH_TOKEN_EXPIRATION:-1209600000}" "$APP_IMAGE_TAG" > .env
            chmod 600 .env
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "Waiting for app to be healthy..."
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' blankit-app 2>/dev/null)
              if [ "$STATUS" = "healthy" ]; then
                echo "App is healthy"
                exit 0
              fi
              if [ "$STATUS" = "unhealthy" ]; then
                echo "App is unhealthy"
                exit 1
              fi
              echo "Attempt $i/24: status=$STATUS, retrying in 10s..."
              sleep 10
            done
            echo "App failed to become healthy within 240s"
            exit 1
