name: 🐛 Bug
description: 버그 리포트
title: "[fix] "
labels: ["fix"]
assignees: []

body:
  - type: textarea
    id: bug-description
    attributes:
      label: 🐛 버그 설명
      description: 어떤 문제가 발생했는지 작성해주세요.
      placeholder: 예) 로그인 요청 시 500 에러가 발생합니다.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 🔁 재현 방법
      description: 버그를 재현하는 순서를 작성해주세요.
      value: |
        1. 
        2.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 🤔 예상 동작
      description: 원래 어떻게 동작해야 하는지 작성해주세요.
      placeholder: 예) 올바른 이메일과 비밀번호 입력 시 JWT가 발급되어야 합니다.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 💻 실제 동작
      description: 실제로 어떻게 동작했는지 작성해주세요.
      placeholder: 예) 500 Internal Server Error가 반환됩니다.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📷 스크린샷 / 로그
      description: 스크린샷이나 에러 로그가 있다면 첨부해주세요.
      render: text
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 🌐 환경
      description: OS, 브랜치, 커밋 정보를 작성해주세요.
      value: |
        - OS: 
        - Branch / Commit:
    validations:
      required: false