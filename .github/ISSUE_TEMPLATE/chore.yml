name: 🔧 Chore
description: 설정, 의존성, 빌드 등 기타 작업
title: "[chore] "
labels: ["chore"]
assignees: []

body:
  - type: textarea
    id: summary
    attributes:
      label: 📌 작업 내용
      description: 무엇을 작업하는지 간단히 작성해주세요.
      placeholder: 예) SecurityConfig 및 Swagger 설정을 추가합니다.
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: ✅ 체크리스트
      description: 처리해야 할 작업을 체크리스트로 작성해주세요.
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 📎 참고 사항
      description: 관련 문서, 의존 이슈 등을 작성해주세요.
      placeholder: 예) 관련 공식 문서 링크, 의존 이슈 번호 등
    validations:
      required: false

  - type: input
    id: related-issue
    attributes:
      label: 🔗 관련 이슈
      description: 연결할 이슈 번호를 작성해주세요.
      placeholder: "#이슈번호"
    validations:
      required: false
