name: ✨ Feature
description: 새로운 기능 개발
title: "[feat] "
labels: ["feat"]
assignees: []

body:
  - type: textarea
    id: summary
    attributes:
      label: 📌 작업 내용
      description: 무엇을 구현하는지 간단히 작성해주세요.
      placeholder: 예) 로그인 API를 구현합니다.
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: ✅ 체크리스트
      description: 구현해야 할 작업을 체크리스트로 작성해주세요.
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 📎 참고 사항
      description: 관련 문서, 디자인, 의존 이슈 등을 작성해주세요.
      placeholder: 예) API 명세, ERD, 피그마 링크 등
    validations:
      required: false

  - type: input
    id: related-issue
    attributes:
      label: 🔗 관련 이슈
      description: 연결할 이슈 번호를 작성해주세요.
      placeholder: "#이슈번호"
    validations:
      required: false